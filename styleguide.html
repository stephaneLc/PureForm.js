<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pureForm - styleguide</title>
    <link rel="stylesheet" href="css/stylesheet.min.css">
</head>
<body>
    <div class="container__principal">
        <header>
            <h1>PureForm - styleguide</h1>
            <p>Référence visuelle des composants.</p>
        </header>

        <main>
            <section class="container__secondary">
                <h3>Couleurs</h3>
                <div class="layout section__color">

                    <div class="container">
                        <div class="container__color primary"></div>
                        <div class="info"><p>Primary - #01257D</p></div>
                    </div>
                    <div class="container">
                        <div class="container__color secondary"></div>
                        <div class="info"><p>Secondary - #202020</p></div>
                    </div>
                    <div class="container">
                        <div class="container__color gray"></div>
                        <div class="info"><p>Gray - #ececf0</p></div>
                    </div>
                    <div class="container">
                        <div class="container__color white"></div>
                        <div class="info"><p>White - #f3f3f5</p></div>
                    </div>
                    <div class="container">
                        <div class="container__color orange"></div>
                        <div class="info"><p>Orange - #FF7A00</p></div>
                    </div>

                </div>
            </section>
            

            <section class="container__secondary">
                <h3>Typographie</h3>
                <div class="layout">
                    <h1>Titre h1 - 26px / 700</h1>
                    <h2>Titre h2 - 22px / 700</h2>
                    <h3>Titre h3 - 18px / 400</h3>
                </div>
            </section>

            <section class="container__secondary">
                <h3>Formulaire</h3>
                <div class="layout">
                    <form action="" method="post" class="form">

                        <div class="form__field">
                            <input type="text" name="fullName" id="fullName">
                            <label for="fullName">Nom et Prénom</label>
                        </div>

                        <div class="form__field">
                            <input type="email" name="email" id="email">
                            <label for="email">Courriel</label>
                        </div>

                        <div class="form__field">
                            <input type="text" name="phone" id="phone">
                            <label for="phone">Téléphone</label>
                        </div>


                        <fieldset>
                            <legend>Disponibilité</legend>
                            <label>
                                <input type="radio" name="availability" value="yes">
                                Oui
                            </label>
                            <label>
                                <input type="radio" name="availability" value="no">
                                Non
                            </label>
                        </fieldset>

                    </form>
                </div>
            </section>

            <section class="container__secondary">
                <h3>Boutons</h3>
                <div class="layout">
                    <button type="submit" class="btn__primary">Envoyer</button>
                    <button type="submit" class="btn__secondary">Annuler</button>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2025 - PureForm.js</p>
        </footer>
    </div>
</body>
</html>

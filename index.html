<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pureForm</title>
<style>
    
    body{
        background-color: #fff;
    }

    .layout{
        max-width: 1024px;
        margin: 0 auto;
    }

    .form{
        border: 1px solid #000;
        min-height: 200px;
    }

   .inputLabel{
        display: flex;
        flex-direction: column;
        max-width: 300px;
    }

    .succes{
        background-color: green;
        color: #fff;
        text-align: center;
        font-size: 18px;
        padding: 10px;
    }
    .error{
        color: #FF0000;
        display: none;
    }
    .resultat{
        font-size: 16px;
        color: green;
    }

</style>
</head>
<body>
    <div class="layout">
        <h1>Pureform - Exploration</h1>
        <br>
        <br>
        <div class="divForm" id="divForm"></div>
    </div>
    <script src="js/main.js"></script>

</html>
